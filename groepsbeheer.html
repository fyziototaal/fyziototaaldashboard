<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fyzio Totaal — Groepsbeheer</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0f0ee;color:#1a1a1a;}
    button{cursor:pointer;font-family:inherit;}
    input,select{font-family:inherit;}
    #root{max-width:1000px;margin:0 auto;padding-bottom:40px;}

    /* ── RESPONSIVE BASE ── */
    button { min-height: 38px; }
    input, select { min-height: 38px; }

    /* ── BOTTOM TAB BAR (mobiel) ── */
    .mob-tabs {
      display: none;
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #1a4a3a; z-index: 200;
      box-shadow: 0 -2px 14px rgba(0,0,0,0.2);
    }
    .mob-tabs-inner { display: flex; }
    .mob-tab-btn {
      flex: 1; background: transparent; border: none;
      color: rgba(255,255,255,0.55); padding: 9px 4px 14px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 11px; font-weight: 600; cursor: pointer;
      display: flex; flex-direction: column; align-items: center;
      gap: 3px; min-height: 58px; transition: color .15s;
    }
    .mob-tab-btn.active { color: #fff; }
    .mob-tab-btn .ticon { font-size: 22px; line-height: 1; }

    /* ── STAT BAR ── */
    .stat-bar {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 8px;
    }
    @media (max-width: 520px) {
      .stat-bar { flex-direction: column; align-items: flex-start; }
      .stat-bar-btns { width: 100%; display: flex; justify-content: flex-end; }
    }

    /* ── DESKTOP TABS ── */
    .desktop-tabs { display: flex; gap: 4px; }

    /* ── DAGKOLOMMEN: swipe-scroll ── */
    .days-scroll-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      /* Zachte scroll-snapping per dag */
      scroll-snap-type: x mandatory;
      cursor: grab;
      padding-bottom: 6px;
    }
    .days-scroll-wrap:active { cursor: grabbing; }
    .days-grid {
      display: grid;
      gap: 10px;
      /* Elke kolom minimaal 200px breed, nooit breder dan 260px */
      grid-auto-columns: clamp(200px, 22vw, 260px);
      grid-auto-flow: column;
      width: max-content;
      min-width: 100%;
    }
    /* Op brede schermen: vul gewoon de breedte */
    @media (min-width: 900px) {
      .days-scroll-wrap { overflow-x: visible; cursor: default; }
      .days-grid { grid-auto-columns: 1fr; width: 100%; }
    }
    /* Scroll-hint schaduw rechts als er meer te zien is */
    .days-scroll-hint {
      position: relative;
    }
    .days-scroll-hint::after {
      content: '';
      position: absolute;
      top: 0; right: 0; bottom: 6px;
      width: 32px;
      background: linear-gradient(to right, transparent, rgba(240,240,238,0.9));
      pointer-events: none;
      border-radius: 0 8px 8px 0;
      transition: opacity .3s;
    }
    .days-scroll-hint.no-hint::after { opacity: 0; }

    /* Snap per kolom */
    .days-grid > div {
      scroll-snap-align: start;
    }

    /* ── FILTER ROW ── */
    .filter-row {
      display: flex; align-items: center; gap: 8px;
      flex-wrap: wrap; margin-bottom: 10px;
    }
    .filter-row-count {
      margin-left: auto;
      font-size: 12px; color: #666;
    }
    @media (max-width: 480px) {
      .filter-row-count { margin-left: 0; width: 100%; }
    }

    /* ── GROEP TOEVOEGEN FORMULIER ── */
    .add-group-row {
      display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end;
    }
    @media (max-width: 520px) {
      .add-group-row > div { width: 100%; flex: none !important; min-width: unset !important; }
      .add-group-row > button { width: 100%; }
    }

    /* ── KAART PANEL ── */
    .member-row {
      display: flex; align-items: center; gap: 5px;
      padding: 6px 0; border-bottom: 1px solid #ddd;
    }
    .member-row .naam { flex: 1; font-size: 13px; font-weight: 500; }

    /* ── DEELNEMER TOEVOEGEN ── */
    .add-member-row {
      display: flex; gap: 5px; margin-bottom: 6px;
      align-items: center; flex-wrap: wrap;
    }
    .add-member-row input { flex: 1; min-width: 80px; }
    @media (max-width: 400px) {
      .add-member-row { flex-direction: column; }
      .add-member-row input,
      .add-member-row select,
      .add-member-row button { width: 100%; }
    }

    /* ── RESERVEER ROW ── */
    .reserveer-row {
      display: flex; gap: 5px; align-items: center; flex-wrap: wrap;
    }
    .reserveer-row input { flex: 1; min-width: 80px; }
    @media (max-width: 400px) {
      .reserveer-row { flex-direction: column; }
      .reserveer-row input,
      .reserveer-row label,
      .reserveer-row button { width: 100%; }
    }

    /* ── WACHTLIJST FORMULIER ── */
    .wl-form-row1 {
      display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px;
    }
    .wl-form-row1 > div { flex: 1; min-width: 130px; }
    @media (max-width: 480px) {
      .wl-form-row1 > div { min-width: 100%; }
    }

    /* ── BESCHIKBAARHEID GRID ── */
    .avail-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 7px;
    }
    @media (max-width: 400px) {
      .avail-grid { grid-template-columns: repeat(2, 1fr); }
    }

    /* ── WACHTLIJST KNOPPEN ── */
    .wl-btns { display: flex; gap: 7px; margin-top: 6px; flex-wrap: wrap; }

    /* ── NOTIFICATION BLOKKEN ── */
    .notif-wrap { padding: 10px 16px 0; }

    /* ── MOBIEL: desktop tabs verbergen, bottom bar tonen ── */
    @media (max-width: 640px) {
      .desktop-tabs { display: none !important; }
      .mob-tabs { display: block; }
      #root { padding-bottom: 4.5rem; }
      .hdr-title { font-size: 16px !important; }
    }

    /* ── KAART HEADER: grotere tap area ── */
    .card-head-tap { padding: 10px 12px 8px; cursor: pointer; }
    .card-foot-tap { padding: 8px 12px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
  </style>
</head>

function stamp(){return Date.now()+Math.random();}
function dateStr(ts){return new Date(ts).toLocaleDateString("nl-NL",{day:"2-digit",month:"2-digit",year:"numeric"});}
function fmtDate(s){if(!s)return null;var p=s.split("-");return p[2]+"-"+p[1]+"-"+p[0];}
function sortG(a){return a.slice().sort(function(a,b){var d=DAY_ORDER.indexOf(a.day)-DAY_ORDER.indexOf(b.day);return d!==0?d:a.time.localeCompare(b.time);});}

function mergeG(saved,init){
  var seen={};
  var dd=saved.filter(function(g){var k=g.day+"|"+g.time;if(seen[k])return false;seen[k]=true;return true;});
  var ids=dd.map(function(g){return g.id;});
  var miss=init.filter(function(g){return ids.indexOf(g.id)===-1;});
  var result=sortG(dd.concat(miss));
  result=result.map(function(g){
    var match=null;
    for(var i=0;i<init.length;i++){if(init[i].id===g.id){match=init[i];break;}}
    if(match)return Object.assign({},g,{niveau:match.niveau||""});
    return g;
  });
  return result;
}

async function loadModule(mod,gKey,wKey,init){
  try{
    var gv=await dbGet(gKey);var wv=await dbGet(wKey);
    STATE[mod].groups=gv?mergeG(JSON.parse(gv),init):init.slice();
    STATE[mod].waitlist=wv?JSON.parse(wv):[];
  }catch(e){STATE[mod].groups=init.slice();STATE[mod].waitlist=[];}
  STATE[mod].loading=false;render();
}

async function saveModule(mod,gKey,wKey){
  STATE[mod].saveStatus="Opslaan…";render();
  var ok1=await dbSet(gKey,JSON.stringify(STATE[mod].groups));
  var ok2=await dbSet(wKey,JSON.stringify(STATE[mod].waitlist));
  STATE[mod].saveStatus=ok1&&ok2?"✓ Opgeslagen":"⚠ Opslaan mislukt";
  render();
  setTimeout(function(){STATE[mod].saveStatus="";render();},2500);
}

function el(tag,attrs,children){
  var e=document.createElement(tag);
  if(attrs)Object.keys(attrs).forEach(function(k){
    if(k==="style"&&typeof attrs[k]==="object"){Object.assign(e.style,attrs[k]);}
    else if(k==="className"){e.className=attrs[k];}
    else if(k.startsWith("on")){e.addEventListener(k.slice(2).toLowerCase(),attrs[k]);}
    else if(k==="checked"){e.checked=attrs[k];}
    else if(k==="value"&&(tag==="input"||tag==="select")){e.value=attrs[k];}
    else if(k==="htmlFor"){e.htmlFor=attrs[k];}
    else{e.setAttribute(k,attrs[k]);}
  });
  if(children){
    (Array.isArray(children)?children:[children]).forEach(function(c){
      if(c==null||c===false)return;
      e.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(String(c)):c);
    });
  }
  return e;
}

function plekLabel(ac,sc,rc,MAX){var t=MAX-ac-rc,tmp=sc>t?t:sc,p=t-tmp;if(p>0&&tmp>0)return p+" plek"+(p!==1?"ken":"")+" vrij + "+tmp+" tijdelijk";if(tmp>0)return tmp+" tijdelijk vrij";if(p>0)return p+" plek"+(p!==1?"ken":"")+" vrij";return"Vol";}
function gStatus(ac,sc,rc,MAX){var t=MAX-ac-rc,tmp=sc>t?t:sc,p=t-tmp;if(ac+rc>=MAX)return"full";if(p>0)return"free";return"temp";}
function calcNotifs(groups,waitlist,MAX){
  var n=[];
  for(var i=0;i<groups.length;i++){
    var g=groups[i],ac=0,sc=0,rc=0;
    for(var j=0;j<g.members.length;j++){var m=g.members[j];if(m.reserved)rc++;else if(m.stopped)sc++;else ac++;}
    if(ac+rc<MAX){
      var matches=[];
      for(var k=0;k<waitlist.length;k++){var w=waitlist[k];if(w.availability&&w.availability[g.day]&&w.availability[g.day][g.time])matches.push(w.naam||"");}
      if(matches.length>0){var tf=MAX-ac-rc,tmp=sc>tf?tf:sc,perm=tf-tmp;var pi=perm>0&&tmp>0?perm+" plek"+(perm!==1?"ken":"")+" vrij + "+tmp+" tijdelijk":perm>0?perm+" plek"+(perm!==1?"ken":"")+" vrij":tmp+" tijdelijk vrij";n.push({group:g.day+" "+g.time,matches:matches,plekInfo:pi,onlyTemp:perm===0});}
    }
  }
  return n;
}
function availSummary(av){if(!av)return"";var parts=[];for(var i=0;i<DAY_ORDER.length;i++){var day=DAY_ORDER[i];if(!av[day])continue;var times=Object.keys(av[day]).filter(function(t){return av[day][t];});if(times.length>0)parts.push(day.substring(0,2)+": "+times.join(", "));}return parts.join(" | ");}

function buildModule(mod,MAX,accent,accentLight){
  var S=STATE[mod];
  var wrap=el("div",{});
  if(S.loading){wrap.appendChild(el("div",{style:{padding:"40px",textAlign:"center",color:accent,fontWeight:"600"}},"⏳ Gegevens laden…"));return wrap;}

  var groups=S.groups,waitlist=S.waitlist;
  var activeDays=DAY_ORDER.filter(function(d){return groups.some(function(g){return g.day===d;});});
  var totalActive=groups.reduce(function(a,g){return a+g.members.filter(function(m){return !m.stopped&&!m.reserved;}).length;},0);
  var totalStopped=groups.reduce(function(a,g){return a+g.members.filter(function(m){return m.stopped;}).length;},0);
  var totalReserved=groups.reduce(function(a,g){return a+g.members.filter(function(m){return m.reserved;}).length;},0);
  var notifs=calcNotifs(groups,waitlist,MAX);
  var permN=notifs.filter(function(n){return !n.onlyTemp;});
  var tempN=notifs.filter(function(n){return n.onlyTemp;});

  var statText=totalActive+" actief"+(totalStopped>0?" · "+totalStopped+" gestopt":"")+(totalReserved>0?" · "+totalReserved+" gereserveerd":"")+" · "+waitlist.length+" wachtlijst";
  var saveBtn=el("button",{style:{padding:"7px 14px",background:accent,color:"#fff",border:"none",borderRadius:"6px",fontSize:"13px",fontWeight:"600"},onClick:function(){saveModule(mod,mod==="ft"?KEYS.ftg:KEYS.bag,mod==="ft"?KEYS.ftw:KEYS.baw);}},"💾 Opslaan");

  var statBarWrap=el("div",{style:{padding:"10px 16px",background:accentLight,borderBottom:"1px solid #ddd"}});
  var statBar=el("div",{className:"stat-bar"});
  statBar.appendChild(el("span",{style:{fontSize:"13px",color:accent,fontWeight:"600"}},statText));
  var statBtns=el("div",{className:"stat-bar-btns",style:{display:"flex",alignItems:"center",gap:"8px"}});
  if(S.saveStatus)statBtns.appendChild(el("span",{style:{fontSize:"12px",color:accent,fontStyle:"italic"}},S.saveStatus));
  statBtns.appendChild(saveBtn);
  statBar.appendChild(statBtns);
  statBarWrap.appendChild(statBar);
  wrap.appendChild(statBarWrap);

  if(permN.length>0||tempN.length>0){

    wfRow1.appendChild(refWrap);
    wForm.appendChild(wfRow1);

    var avWrap=el("div",{style:{marginBottom:"10px"}});
    avWrap.appendChild(el("div",{style:{fontSize:"13px",fontWeight:"600",color:"#666",marginBottom:"6px"}},"Beschikbaarheid"));
    var dpRow=el("div",{style:{display:"flex",gap:"7px",marginBottom:"8px",flexWrap:"wrap"}});
    [["vroeg","🌅 Ochtend vroeg"],["ochtend","☀️ Ochtend"],["avond","🌙 Avond"]].forEach(function(opt){
      dpRow.appendChild(el("button",{style:{padding:"6px 12px",borderRadius:"16px",border:"1px solid "+accent,background:accentLight,color:accent,fontSize:"12px",fontWeight:"500",minHeight:"34px"},onClick:function(){
        var avail=JSON.parse(JSON.stringify(S.wlForm.availability||{}));
        var tp=[];
        for(var i=0;i<groups.length;i++){var gg=groups[i];var p=gg.time.split(":");var tm=parseInt(p[0],10)*60+parseInt(p[1],10);var match=false;if(opt[0]==="vroeg"&&tm<=7*60+35)match=true;if(opt[0]==="ochtend"&&tm>7*60+35&&tm<12*60)match=true;if(opt[0]==="avond"&&tm>=18*60)match=true;if(match)tp.push({day:gg.day,time:gg.time});}
        var allOn=tp.every(function(t){return avail[t.day]&&avail[t.day][t.time];});
        tp.forEach(function(t){if(!avail[t.day])avail[t.day]={};avail[t.day][t.time]=!allOn;});
        S.wlForm.availability=avail;render();
      }},opt[1]));
    });
    dpRow.appendChild(el("button",{style:{padding:"6px 12px",borderRadius:"16px",border:"1px solid #ddd",background:"#fff",color:"#666",fontSize:"12px",minHeight:"34px"},onClick:function(){S.wlForm.availability={};render();}},"Wis alles"));
    avWrap.appendChild(dpRow);

    var cbGrid=el("div",{className:"avail-grid"});
    activeDays.forEach(function(day){
      var dg=groups.filter(function(gg){return gg.day===day;}).sort(function(a,b){return a.time.localeCompare(b.time);});
      if(dg.length===0)return;
      var dc=el("div",{style:{background:"#fff",border:"1px solid #ddd",borderRadius:"8px",padding:"8px 10px"}});
      dc.appendChild(el("div",{style:{fontSize:"12px",fontWeight:"600",color:accent,marginBottom:"5px"}},day));
      dg.forEach(function(gg){
        var checked=S.wlForm.availability[day]&&S.wlForm.availability[day][gg.time];
        var lbl=el("label",{style:{display:"flex",alignItems:"center",gap:"7px",fontSize:"13px",marginBottom:"5px",cursor:"pointer",minHeight:"30px"}});
        var cb=el("input",{type:"checkbox",style:{width:"18px",height:"18px"},onChange:function(e){if(!S.wlForm.availability[day])S.wlForm.availability[day]={};S.wlForm.availability[day][gg.time]=e.target.checked;render();}});
        cb.checked=!!checked;
        lbl.appendChild(cb);lbl.appendChild(document.createTextNode(gg.time));
        dc.appendChild(lbl);
      });
      cbGrid.appendChild(dc);
    });
    avWrap.appendChild(cbGrid);
    wForm.appendChild(avWrap);

    var noteWrap=el("div",{style:{marginBottom:"12px"}});
    noteWrap.appendChild(el("label",{style:{fontSize:"13px",fontWeight:"600",color:"#666",marginBottom:"4px",display:"block"}},"Notitie"));
    noteWrap.appendChild(el("input",{style:{width:"100%",padding:"8px 10px",border:"1px solid #ddd",borderRadius:"6px",fontSize:"14px",boxSizing:"border-box"},placeholder:"opmerkingen",value:S.wlForm.note,onInput:function(e){S.wlForm.note=e.target.value;}}));
    wForm.appendChild(noteWrap);

    var wfBtns=el("div",{style:{display:"flex",gap:"8px",flexWrap:"wrap"}});
    wfBtns.appendChild(el("button",{style:{padding:"8px 16px",background:G.orange,color:"#fff",border:"none",borderRadius:"6px",fontSize:"14px",fontWeight:"600"},onClick:function(){
      if(!S.wlForm.naam.trim())return;
      var entry={naam:S.wlForm.naam.trim(),availability:S.wlForm.availability,referrer:S.wlForm.referrer,referrerOther:S.wlForm.referrerOther,note:S.wlForm.note};
      if(S.wlEditId!==null){STATE[mod].waitlist=waitlist.map(function(w){if(w.id!==S.wlEditId)return w;return Object.assign({},w,entry);});S.wlEditId=null;}
      else{waitlist.push(Object.assign({id:stamp(),date:stamp()},entry));}
      S.wlForm={naam:"",availability:{},referrer:"",referrerOther:"",note:""};render();
    }},S.wlEditId!==null?"Opslaan":"+ Toevoegen"));
    if(S.wlEditId!==null)wfBtns.appendChild(el("button",{style:{padding:"7px 14px",background:accentLight,color:accent,border:"1px solid "+accent,borderRadius:"6px",fontSize:"13px"},onClick:function(){S.wlEditId=null;S.wlForm={naam:"",availability:{},referrer:"",referrerOther:"",note:""};render();}},"Annuleren"));
    wForm.appendChild(wfBtns);
    wWrap.appendChild(wForm);

    wWrap.appendChild(el("p",{style:{fontSize:"15px",fontWeight:"700",color:accent,margin:"0 0 8px"}},"Wachtlijst ("+waitlist.length+")"));
    if(waitlist.length===0)wWrap.appendChild(el("div",{style:{color:"#666",fontSize:"13px"}},"Wachtlijst is leeg."));

    var sorted=waitlist.slice().sort(function(a,b){return a.date-b.date;});
    sorted.forEach(function(w,i){
      var ref=w.referrer==="anders"?(w.referrerOther||"anders"):w.referrer;
      var avail=availSummary(w.availability);
      var wCard=el("div",{style:{background:"#fff",border:"1px solid #ddd",borderRadius:"10px",marginBottom:"8px",padding:"12px 14px"}});
      var wHead=el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"5px",flexWrap:"wrap",gap:"4px"}});
      var wLeft=el("div",{});
      wLeft.appendChild(el("span",{style:{fontSize:"12px",color:"#666",marginRight:"6px"}},"#"+(i+1)));
      wLeft.appendChild(el("span",{style:{fontWeight:"600",fontSize:"15px",color:accent}},w.naam));
      if(ref)wLeft.appendChild(el("span",{style:{fontSize:"12px",color:"#666",marginLeft:"8px"}},"via "+ref));
      wHead.appendChild(wLeft);
      wHead.appendChild(el("span",{style:{fontSize:"12px",color:"#666"}},dateStr(w.date)));
      wCard.appendChild(wHead);
      if(avail)wCard.appendChild(el("div",{style:{fontSize:"13px",color:"#666",marginBottom:"3px"}},"📅 "+avail));
      if(w.note)wCard.appendChild(el("div",{style:{fontSize:"13px",color:"#666",fontStyle:"italic"}},"💬 "+w.note));
      var wBtns=el("div",{className:"wl-btns"});
      wBtns.appendChild(el("button",{style:{padding:"6px 14px",background:accentLight,color:accent,border:"1px solid "+accent,borderRadius:"6px",fontSize:"13px",minHeight:"36px"},onClick:function(){S.wlEditId=w.id;S.wlForm={naam:w.naam||"",availability:w.availability||{},referrer:w.referrer||"",referrerOther:w.referrerOther||"",note:w.note||""};render();}},"✏ Bewerken"));
      wBtns.appendChild(el("button",{style:{padding:"6px 14px",background:"#fdecea",color:G.red,border:"1px solid "+G.red,borderRadius:"6px",fontSize:"13px",minHeight:"36px"},onClick:function(){STATE[mod].waitlist=waitlist.filter(function(x){return x.id!==w.id;});render();}},"✕ Verwijderen"));
      wCard.appendChild(wBtns);
      wWrap.appendChild(wCard);
    });
    wrap.appendChild(wWrap);
  }

  return wrap;
}

function buildApp(){
  var app=el("div",{style:{fontFamily:"'Segoe UI',system-ui,sans-serif",color:"#1a1a1a"}});

  var hdr=el("div",{style:{background:G.green,color:"#fff",padding:"14px 16px 0",borderRadius:"0 0 12px 12px"}});
  var hdrTop=el("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"10px"}});
  hdrTop.appendChild(el("h1",{className:"hdr-title",style:{margin:"0",fontSize:"18px",fontWeight:"600"}},"Fyzio Totaal — Groepsbeheer"));
  hdr.appendChild(hdrTop);

  var tabRow=el("div",{className:"desktop-tabs"});
  [["ft","🏃 Fyziotraining"],["ba","⚖️ Balance"]].forEach(function(t){
    var active=STATE.mainTab===t[0];
    tabRow.appendChild(el("button",{style:{padding:"9px 24px",borderRadius:"10px 10px 0 0",border:"none",fontSize:"14px",fontWeight:"600",background:active?"#fff":G.greenMid,color:active?(t[0]==="ft"?G.green:G.blue):"rgba(255,255,255,0.8)",minHeight:"42px"},onClick:function(){STATE.mainTab=t[0];render();}},t[1]));
  });
  hdr.appendChild(tabRow);
  app.appendChild(hdr);

  var body=el("div",{style:{border:"1px solid #ddd",borderTop:"none",borderRadius:"0 0 12px 12px",overflow:"hidden",background:"#fff"}});
  if(STATE.mainTab==="ft")body.appendChild(buildModule("ft",FT_MAX,G.green,G.greenLight));
  else body.appendChild(buildModule("ba",BA_MAX,G.blue,G.blueLight));
  app.appendChild(body);
  return app;
}

loadModule("ft",KEYS.ftg,KEYS.ftw,FT_INIT);
loadModule("ba",KEYS.bag,KEYS.baw,BA_INIT);
</script>
</body>
