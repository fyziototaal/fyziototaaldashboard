<div id="root"></div>
<script>
// Opslag: buiten Claude bestaat window.storage niet — hier gebruiken we localStorage van de browser.
// Let op: gegevens staan dan per apparaat/browser lokaal, niet gedeeld tussen teamleden.
if (!window.storage) {
  window.storage = {
    async get(key, shared) {
      const v = localStorage.getItem("fyzio-" + key);
      if (v === null) throw new Error("Key not found: " + key);
      return { key, value: v, shared: !!shared };
    },
    async set(key, value, shared) {
      localStorage.setItem("fyzio-" + key, value);
      return { key, value, shared: !!shared };
    },
    async delete(key, shared) {
      localStorage.removeItem("fyzio-" + key);
      return { key, deleted: true, shared: !!shared };
    },
    async list(prefix, shared) {
      const keys = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k.startsWith("fyzio-") && (!prefix || k.slice(6).startsWith(prefix))) keys.push(k.slice(6));
      }
      return { keys, prefix, shared: !!shared };
    },
  };
}
